<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Ngomel</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:90px;
overflow:hidden;
background:#060606;
color:white;
}

/* AURORA BACKGROUND */

.aurora{
position:absolute;
width:200%;
height:200%;

background:
radial-gradient(circle at 20% 30%, rgba(255,0,0,0.35), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,120,255,0.35), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(160,0,255,0.25), transparent 40%);

filter:blur(120px);

animation:auroraMove 20s linear infinite;
}

@keyframes auroraMove{
0%{transform:translate(-10%,-10%)}
50%{transform:translate(10%,10%)}
100%{transform:translate(-10%,-10%)}
}

/* CAHAYA MOUSE */

.light{
position:absolute;
width:380px;
height:380px;

background:radial-gradient(circle, rgba(255,255,255,0.25), transparent 60%);

pointer-events:none;
mix-blend-mode:soft-light;
transform:translate(-50%,-50%);
}

/* CONTAINER */

.container{
position:relative;
text-align:center;
width:85%;
max-width:300px;
z-index:2;
}

/* FOTO PROFIL */

.profile{
width:95px;
height:95px;
border-radius:50%;
border:3px solid white;
margin-bottom:10px;

box-shadow:
0 0 20px rgba(255,255,255,0.5),
0 0 40px rgba(255,0,0,0.4);

animation:profileGlow 3s ease-in-out infinite alternate;
}

@keyframes profileGlow{
from{
box-shadow:
0 0 20px rgba(255,255,255,0.5),
0 0 30px rgba(255,0,0,0.3);
}

to{
box-shadow:
0 0 25px rgba(255,255,255,0.8),
0 0 45px rgba(0,120,255,0.4);
}
}

/* JUDUL */

h1{
font-size:20px;
font-weight:700;
margin-bottom:20px;
color:white;
}

/* BUTTON */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

padding:11px;
margin:9px 0;

border-radius:16px;

text-decoration:none;
color:white;
font-size:14px;
font-weight:600;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,0.25);

transition:all .25s ease;
}

.link i{
font-size:18px;
}

.link:hover{
transform:scale(1.05);
}

.link:active{
transform:scale(0.9);
}

/* BRAND COLOR */

.youtube:hover{background:#ff0000;}
.facebook:hover{background:#1877f2;}
.gmail:hover{background:#ea4335;}

</style>
</head>

<body>

<div class="aurora"></div>
<div class="light" id="light"></div>

<div class="container">

<img src="https://unavatar.io/youtube/autongomel" class="profile">

<h1>Auto Ngomel</h1>

<a href="https://youtube.com/@autongomel" class="link youtube">
<i class="fab fa-youtube"></i> YouTube
</a>

<a href="https://www.facebook.com/profile.php?id=61588225227889" class="link facebook">
<i class="fab fa-facebook"></i> Facebook
</a>

<a href="mailto:szodiyamada@gmail.com" class="link gmail">
<i class="fas fa-envelope"></i> Gmail
</a>

</div>

<script>

const light = document.getElementById("light");

document.addEventListener("mousemove", e=>{
light.style.left = e.clientX + "px";
light.style.top = e.clientY + "px";
});

document.addEventListener("touchmove", e=>{
light.style.left = e.touches[0].clientX + "px";
light.style.top = e.touches[0].clientY + "px";
});

</script>

</body>
</html>
